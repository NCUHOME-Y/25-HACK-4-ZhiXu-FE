map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost zhixu.online www.zhixu.online;

    root /usr/share/nginx/html;
    index index.html;

    # 1. 前端静态资源
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 静态资源加速
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 3. 处理前端 undefined 路径 Bug
    location /undefined/api/ {
        rewrite ^/undefined/api/(.*)$ /api/$1 break;
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 4. 标准 API 代理（确保历史消息正常）
    location /api/ {
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 保持 API 的简单干净，不启用 WS 升级
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
        
        proxy_read_timeout 60s;
    }

    # 5. WebSocket 专用代理：/ws/chat (针对 Go + Gorilla 优化)
    # 注意：使用 ^~ 提高匹配优先级，防止被正则干扰
    location ^~ /ws/ {
        # 后面不加斜杠，确保 /ws/chat 完整传递给 Go 后端
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;

        # WebSocket 核心头部
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 转发原始信息供 Go 后端 CheckOrigin 校验
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 【关键：解决无法收发消息】
        # Go 的 gorilla/websocket 在 Azure 环境下必须关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        tcp_nodelay on;

        # 【关键：解决连接断开】
        # 延长超时时间到 1 小时，防止 Azure 负载均衡器因空闲切断连接
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    error_page 404 /index.html;
}