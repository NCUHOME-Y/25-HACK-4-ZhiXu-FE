map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost zhixu.online www.zhixu.online;

    root /usr/share/nginx/html;
    index index.html;

    # 1. 前端静态资源
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 静态资源加速
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 3. 处理前端 undefined 路径 Bug（保持原样，这个不影响主逻辑）
    location /undefined/api/ {
        rewrite ^/undefined/api/(.*)$ /api/$1 break;
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 4. 标准 API 代理（确保历史消息正常）
    location /api/ {
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        # 硬编码 Host 是 Azure 识别请求的关键
        proxy_set_header Host unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 告诉后端这是一个安全的 HTTPS 请求，防止后端安全框架拦截
        proxy_set_header X-Forwarded-Proto https;

        # 保持你那个版本里有的 Upgrade 设置
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_read_timeout 60s;
    }

    # 5. WebSocket 代理（专项修复：发消息断开问题）
    location /ws/ {
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 必须强制为 https，否则 Azure 的 WSS 握手在发送数据阶段会被掐断
        proxy_set_header X-Forwarded-Proto https;
        
        # 针对“发消息断开”：透传 Origin 
        proxy_set_header Origin $http_origin;

        # 禁用缓存和缓冲，这对实时聊天至关重要
        proxy_buffering off;
        proxy_cache off;
        tcp_nodelay on;

        # 这里的超时时间必须足够长
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    error_page 404 /index.html;
}