map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost zhixu.online www.zhixu.online;

    root /usr/share/nginx/html;
    index index.html;

    # 1. 前端静态资源
    location / {
        try_files $uri $uri/ /index.html;
        
        # 缓存优化
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 2. API 代理
    location /api/ {
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io; 
        
        # 【核心修复 1】：开启 SNI！告诉 Azure 网关我们要访问哪个应用的证书
        proxy_ssl_server_name on;

        # 【核心修复 2】：Host 必须是后端的真实 FQDN，不能是前端的 zhixu.online ($host)
        # $proxy_host 是 Nginx 的内置变量，代表 proxy_pass 里的域名
        proxy_set_header Host $proxy_host; 
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # 强制使用 HTTP/1.1 并清除 Upgrade，防止协议错误
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 3. WebSocket 代理
    location /ws/ {
        proxy_pass https://unimate-backend.happymushroom-0115c5b7.eastasia.azurecontainerapps.io;
        
        # WS 同样需要 SNI 和正确的 Host
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # 4. 基础安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # 将 404 错误指向 index.html，交给前端路由处理
    error_page 404 /index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
}